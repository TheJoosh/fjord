<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fjord HTML</title>
        <link rel="stylesheet" href="styles.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="icon" href="fehu.ico" />
    </head>
    <body>
        <header>
            <h1>Fjord</h1>

            <nav>
                <menu>
                <li><a href="index.html">Home</a></li>
                <li><a href="packs.html">Open Card Packs</a></li>
                <li><a href="deck.html">View Deck</a></li>
                <li><a href="trades.html">Trade</a></li>
                <li><a href="designer.html">Design Cards</a></li>
                </menu>
            </nav>
            
        </header>

        <main>

            <button class="request">Request trade</button>
            <section class="other">
                <h2 class="other_user">Other User</h2>
                <table>
                    <tr>
                        <th>Card1</th>
                        <th>Card2</th>
                        <th>Card3</th>
                    </tr>
                </table>

                <h3 class="value">Trade Value: $0.00</h3>

            </section>

            <button class="accept">
                <h2>Accept Trade</h2>
            </button>

            <button class="cancel">
                <h2>Cancel Trade</h2>
            </button>

            <section class="yoUser">
                <h2 class="user_name">User</h2>
                <table>
                    <tr>
                        <th>
                            Card1
                            <button class="remove">Remove Card</button>
                        </th>
                        <th>
                            Card2
                            <button class="remove">Remove Card</button>
                        </th>
                        <th>
                            Card3
                            <button class="remove">Remove Card</button>
                        </th>
                    </tr>
                </table>

                <h3 class="value">Trade Value: $0.00</h3>
                <button class="picker">Pick from your deck</button>

            </section>
            

        </main>

        <footer>
            <span class="text-reset">Josh Brown</span>
            <br />
            <a href="https://github.com/TheJoosh/fjord">GitHub</a>
        </footer>
    </body>
