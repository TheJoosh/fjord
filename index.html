<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Fjord CSS</title>
        <link rel="icon" href="fehu.ico" />
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <nav>
                <menu>
                <li><a href="index.html">Home</a></li>
                <li><a href="packs.html">Open Card Packs</a></li>
                <li><a href="deck.html">View Deck</a></li>
                <li><a href="trades.html">Trade</a></li>
                <li><a href="designer.html">Design Cards</a></li>
                </menu>
            </nav>
            
        </header>

        <main>
                <div class="column login">
                    <div>
                        <img class="logo"width="30px" src="fehu-symbol-icon.png" alt="Fehu, a runic letter F"/>
                    </div>
                    <h1>FJORD</h1>

                    <div class="spacer">
                        <span>Welcome to the Fjords. Begin your voyage today!</span>
                    </div>

                    <form class="login-form" method="get" action="deck.html">
                        <div>
                            <span>Email</span>
                            <input type="text" placeholder="your@email.com" />
                        </div>
                        <div>
                            <span>Password</span>
                            <input type="password" placeholder="password" />
                        </div>
                        <button type="submit">Log in</button>
                        <button type="submit">Create account</button>
                    </form>
                </div>

        </main>

        <div class="header-image">
            <img src="Card Images/longboat.png" alt="A longboat floating on the fjord" object-fit="cover" />
        </div>

        <footer>
            <span class="text-reset">Josh Brown</span>
            <br />
            <a href="https://github.com/TheJoosh/fjord">GitHub</a>
        </footer>
    </body>




</html>
