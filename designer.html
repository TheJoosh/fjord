<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fjord HTML</title>
        <link rel="icon" href="fehu.ico" />
    </head>
    <body>
        <header>
            <h1>Fjord</h1>

            <nav>
                <menu>
                <li><a href="index.html">Home</a></li>
                <li><a href="packs.html">Open Card Packs</a></li>
                <li><a href="deck.html">View Deck</a></li>
                <li><a href="trades.html">Trade</a></li>
                <li><a href="designer.html">Design Cards</a></li>
                </menu>
            </nav>
            
        </header>

        <main>
            <hr />

            <form>
                <div>
                    <span>Title:</span>
                    <input type="text" placeholder="Card Title" />
                </div>
                
                <div>
                    <label for="card_class">Class:</label>
                        <select id="card_class" name="class">
                        <option value="warrior">Warrior</option>
                        <option value="spell">Spell</option>
                        <option value="attachment">Weapon</option>
                        <option value="attachment">Mount</option>
                        <option value="attachment">Companion</option>
                    </select>
                </div>
                
                <div>
                    <span>Description:</span>
                    <textarea placeholder="Description" ></textarea>
                </div>

                
                <div>
                    <span>Cost:</span>
                    <input type="number" placeholder="Fate cost" />
                </div>


            </form>


        </main>

        <footer>
            <hr />
            <span class="text-reset">Josh Brown</span>
            <br />
            <a href="https://github.com/TheJoosh/fjord">GitHub</a>
        </footer>
    </body>
